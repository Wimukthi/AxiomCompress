name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
  schedule:
    - cron: "0 6 * * *"   # nightly: longer fuzzing run

permissions:
  contents: read

jobs:
  # Build with CMake (toolset-agnostic; the checked-in .sln pins MSVC v145 which
  # hosted runners do not have) and run the full test suite, which itself
  # includes roundtrip, safety, and in-process mutation-fuzz checks.
  build-and-test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - name: Configure
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release
      - name: Build
        run: cmake --build build --config Release
      - name: Test
        run: ctest --test-dir build -C Release --output-on-failure

  # Coverage-guided libFuzzer under AddressSanitizer over the untrusted decode
  # surfaces: the single-stream decoder and the archive container parser.
  fuzz-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Pick fuzz duration
        id: dur
        run: echo "seconds=${{ github.event_name == 'schedule' && 600 || 60 }}" >> "$GITHUB_OUTPUT"
      - name: Build fuzz targets (clang + libFuzzer + ASan)
        run: |
          set -euo pipefail
          cxx_srcs="src/archive/container.cpp src/archive/container_formats.cpp \
                    src/archive/container_zip.cpp src/archive/system_provider.cpp \
                    src/archive/zip_split_backend.cpp \
                    src/codec/block.cpp src/codec/fast_lz.cpp \
                    src/codec/lz77.cpp src/codec/lz77_split.cpp src/codec/transform.cpp \
                    src/core/archive.cpp \
                    src/core/checksum.cpp src/core/cpu.cpp src/core/crypto.cpp \
                    src/core/file_meta.cpp src/core/reed_solomon.cpp \
                    src/entropy/huffman.cpp src/entropy/range.cpp"
          c_srcs="src/third_party/blake3/blake3.c src/third_party/blake3/blake3_dispatch.c \
                  src/third_party/blake3/blake3_portable.c \
                  src/third_party/miniz/miniz.c src/third_party/miniz/miniz_tdef.c \
                  src/third_party/miniz/miniz_tinfl.c src/third_party/miniz/miniz_zip.c \
                  src/third_party/minizip-ng/mz_crypt.c \
                  src/third_party/minizip-ng/mz_os.c \
                  src/third_party/minizip-ng/mz_os_posix.c \
                  src/third_party/minizip-ng/mz_strm.c \
                  src/third_party/minizip-ng/mz_strm_buf.c \
                  src/third_party/minizip-ng/mz_strm_mem.c \
                  src/third_party/minizip-ng/mz_strm_os_posix.c \
                  src/third_party/minizip-ng/mz_strm_split.c \
                  src/third_party/minizip-ng/mz_zip.c \
                  src/third_party/minizip-ng/mz_zip_rw.c \
                  src/third_party/monocypher/monocypher.c"
          mkdir -p build/fuzz-linux
          checksum_clmul_obj="build/fuzz-linux/checksum_clmul.o"
          clang++ -std=c++20 -O1 -g -fsanitize=address -msse4.1 -mpclmul \
            -DBLAKE3_NO_AVX512 -DBLAKE3_NO_AVX2 -DBLAKE3_NO_SSE41 -DBLAKE3_NO_SSE2 \
            -Iinclude -Isrc -c src/core/checksum_clmul.cpp -o "$checksum_clmul_obj"
          c_objs=()
          for src in $c_srcs; do
            obj="build/fuzz-linux/$(basename "$src").o"
            clang -std=c17 -O1 -g -fsanitize=address \
              -D_POSIX_C_SOURCE=200809L -D_FILE_OFFSET_BITS=64 \
              -DMZ_ZIP_NO_CRYPTO \
              -DBLAKE3_NO_AVX512 -DBLAKE3_NO_AVX2 -DBLAKE3_NO_SSE41 -DBLAKE3_NO_SSE2 \
              -Iinclude -Isrc -c "$src" -o "$obj"
            c_objs+=("$obj")
          done
          for target in fuzz_decompress fuzz_archive; do
            clang++ -std=c++20 -O1 -g -fsanitize=fuzzer,address \
              -DBLAKE3_NO_AVX512 -DBLAKE3_NO_AVX2 -DBLAKE3_NO_SSE41 -DBLAKE3_NO_SSE2 \
              -Iinclude -Isrc $cxx_srcs fuzz/$target.cpp "$checksum_clmul_obj" "${c_objs[@]}" -o $target
          done
      - name: Fuzz decode surfaces
        run: |
          set -euo pipefail
          secs="${{ steps.dur.outputs.seconds }}"
          ASAN_OPTIONS=allocator_may_return_null=1 ./fuzz_decompress -max_total_time=$secs -rss_limit_mb=2048
          ASAN_OPTIONS=allocator_may_return_null=1 ./fuzz_archive    -max_total_time=$secs -rss_limit_mb=2048
      - name: Upload crash artifacts
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: fuzz-crashes
          path: |
            crash-*
            oom-*
            timeout-*
          if-no-files-found: ignore

  # On Windows the toolset's bundled libFuzzer is driven through the helper
  # scripts (cl /fsanitize=fuzzer /fsanitize=address).
  fuzz-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6
      - name: Build axiomc (for seed corpus)
        run: |
          cmake -B build -DCMAKE_BUILD_TYPE=Release
          cmake --build build --config Release
          Copy-Item build/Release/axiomc.exe out/Release/axiomc.exe -Force -ErrorAction SilentlyContinue
        shell: pwsh
      - name: Build fuzz targets
        run: ./tools/build_fuzz.ps1 -Target all
        shell: pwsh
      - name: Fuzz
        run: ./tools/run_fuzz.ps1 -Seconds ${{ github.event_name == 'schedule' && 600 || 60 }} -Target all
        shell: pwsh
