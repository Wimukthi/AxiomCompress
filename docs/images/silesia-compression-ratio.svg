<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="768" viewBox="0 0 1000 768" role="img" aria-labelledby="title desc">
  <title id="title">Silesia compression ratio by codec</title>
  <desc id="desc">Horizontal bars compare compression ratios. Higher values are better; Axiom results are orange.</desc>
  <style>
    :root{--bg:#fff;--fg:#172033;--muted:#667085;--grid:#d9dee8;--axiom:#e26d2f;--zstd:#238b74;--lz4:#3973c6;--lzma2:#a54d9d;--winrar:#c43b4d;--other:#7b8798}
    @media(prefers-color-scheme:dark){:root{--bg:#0d1117;--fg:#e6edf3;--muted:#9ba7b4;--grid:#30363d;--axiom:#ff934f;--zstd:#4fc3a1;--lz4:#73a7ef;--lzma2:#d88ad0;--winrar:#ff667a;--other:#a6b0bd}}
    .bg{fill:var(--bg)}.fg{fill:var(--fg)}.muted{fill:var(--muted)}.grid{stroke:var(--grid);stroke-width:1}.axis{stroke:var(--muted);stroke-width:1.2}
    text{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:13px}.title{font-size:20px;font-weight:500}.subtitle{font-size:12px}.value{font-weight:500}
    .axiom{fill:var(--axiom)}.zstd{fill:var(--zstd)}.lz4{fill:var(--lz4)}.lzma2{fill:var(--lzma2)}.winrar{fill:var(--winrar)}.other{fill:var(--other)}.best{stroke:var(--fg);stroke-width:2}
  </style>
  <rect class="bg" width="1000" height="768"/>
  <text class="title fg" x="24" y="32">Silesia compression ratio</text>
  <text class="subtitle muted" x="24" y="54">211.9 MB mixed-data tar &#183; higher is better</text>
  <line class="grid" x1="180.0" y1="68" x2="180.0" y2="720"/>
  <text class="muted" x="180.0" y="750" text-anchor="middle">0&#215;</text>
  <line class="grid" x1="343.6" y1="68" x2="343.6" y2="720"/>
  <text class="muted" x="343.6" y="750" text-anchor="middle">1&#215;</text>
  <line class="grid" x1="507.1" y1="68" x2="507.1" y2="720"/>
  <text class="muted" x="507.1" y="750" text-anchor="middle">2&#215;</text>
  <line class="grid" x1="670.7" y1="68" x2="670.7" y2="720"/>
  <text class="muted" x="670.7" y="750" text-anchor="middle">3&#215;</text>
  <line class="grid" x1="834.2" y1="68" x2="834.2" y2="720"/>
  <text class="muted" x="834.2" y="750" text-anchor="middle">4&#215;</text>
  <text class="fg" x="168" y="98" text-anchor="end">LZMA2 -mx9</text>
  <rect class="lzma2" x="180" y="85" width="712.0" height="19" rx="3"><title>LZMA2 -mx9: 4.35x, 48.7 MB</title></rect>
  <text class="value fg" x="900.0" y="99">4.35&#215;</text>
  <text class="fg" x="168" y="127" text-anchor="end">LZMA2 -mx5</text>
  <rect class="lzma2" x="180" y="114" width="698.7" height="19" rx="3"><title>LZMA2 -mx5: 4.27x, 49.6 MB</title></rect>
  <text class="value fg" x="886.7" y="128">4.27&#215;</text>
  <text class="fg" x="168" y="156" text-anchor="end" font-weight="500">Axiom -9</text>
  <rect class="axiom best" x="180" y="143" width="674.6" height="19" rx="3"><title>Axiom -9: 4.12x, 51.4 MB</title></rect>
  <text class="value fg" x="862.6" y="157">4.12&#215;</text>
  <text class="fg" x="168" y="185" text-anchor="end">zstd -22 --ultra</text>
  <rect class="zstd" x="180" y="172" width="662.9" height="19" rx="3"><title>zstd -22 --ultra: 4.05x, 52.3 MB</title></rect>
  <text class="value fg" x="850.9" y="186">4.05&#215;</text>
  <text class="fg" x="168" y="214" text-anchor="end">Axiom -8</text>
  <rect class="axiom" x="180" y="201" width="661.4" height="19" rx="3"><title>Axiom -8: 4.04x, 52.4 MB</title></rect>
  <text class="value fg" x="849.4" y="215">4.04&#215;</text>
  <text class="fg" x="168" y="243" text-anchor="end">zstd -19</text>
  <rect class="zstd" x="180" y="230" width="655.9" height="19" rx="3"><title>zstd -19: 4.01x, 52.8 MB</title></rect>
  <text class="value fg" x="843.9" y="244">4.01&#215;</text>
  <text class="fg" x="168" y="272" text-anchor="end">WinRAR -m5 128M</text>
  <rect class="winrar" x="180" y="259" width="652.2" height="19" rx="3"><title>WinRAR -m5 128M: 3.99x, 53.2 MB</title></rect>
  <text class="value fg" x="840.2" y="273">3.99&#215;</text>
  <text class="fg" x="168" y="301" text-anchor="end">bzip2 -9</text>
  <rect class="other" x="180" y="288" width="639.3" height="19" rx="3"><title>bzip2 -9: 3.91x, 54.2 MB</title></rect>
  <text class="value fg" x="827.3" y="302">3.91&#215;</text>
  <text class="fg" x="168" y="330" text-anchor="end">WinRAR -m3</text>
  <rect class="winrar" x="180" y="317" width="639.2" height="19" rx="3"><title>WinRAR -m3: 3.91x, 54.2 MB</title></rect>
  <text class="value fg" x="827.2" y="331">3.91&#215;</text>
  <text class="fg" x="168" y="359" text-anchor="end">Axiom -7</text>
  <rect class="axiom" x="180" y="346" width="631.7" height="19" rx="3"><title>Axiom -7: 3.86x, 54.9 MB</title></rect>
  <text class="value fg" x="819.7" y="360">3.86&#215;</text>
  <text class="fg" x="168" y="388" text-anchor="end">Axiom -6</text>
  <rect class="axiom" x="180" y="375" width="616.4" height="19" rx="3"><title>Axiom -6: 3.77x, 56.2 MB</title></rect>
  <text class="value fg" x="804.4" y="389">3.77&#215;</text>
  <text class="fg" x="168" y="417" text-anchor="end">Axiom -5</text>
  <rect class="axiom" x="180" y="404" width="613.7" height="19" rx="3"><title>Axiom -5: 3.75x, 56.5 MB</title></rect>
  <text class="value fg" x="801.7" y="418">3.75&#215;</text>
  <text class="fg" x="168" y="446" text-anchor="end">Axiom -4</text>
  <rect class="axiom" x="180" y="433" width="609.8" height="19" rx="3"><title>Axiom -4: 3.73x, 56.8 MB</title></rect>
  <text class="value fg" x="797.8" y="447">3.73&#215;</text>
  <text class="fg" x="168" y="475" text-anchor="end">Axiom -3</text>
  <rect class="axiom" x="180" y="462" width="593.3" height="19" rx="3"><title>Axiom -3: 3.63x, 58.4 MB</title></rect>
  <text class="value fg" x="781.3" y="476">3.63&#215;</text>
  <text class="fg" x="168" y="504" text-anchor="end">Axiom -2</text>
  <rect class="axiom" x="180" y="491" width="586.5" height="19" rx="3"><title>Axiom -2: 3.59x, 59.1 MB</title></rect>
  <text class="value fg" x="774.5" y="505">3.59&#215;</text>
  <text class="fg" x="168" y="533" text-anchor="end">zstd -9</text>
  <rect class="zstd" x="180" y="520" width="585.7" height="19" rx="3"><title>zstd -9: 3.58x, 59.2 MB</title></rect>
  <text class="value fg" x="773.7" y="534">3.58&#215;</text>
  <text class="fg" x="168" y="562" text-anchor="end">gzip Deflate -9</text>
  <rect class="other" x="180" y="549" width="535.7" height="19" rx="3"><title>gzip Deflate -9: 3.28x, 64.7 MB</title></rect>
  <text class="value fg" x="723.7" y="563">3.28&#215;</text>
  <text class="fg" x="168" y="591" text-anchor="end">Axiom -1</text>
  <rect class="axiom" x="180" y="578" width="534.1" height="19" rx="3"><title>Axiom -1: 3.27x, 64.9 MB</title></rect>
  <text class="value fg" x="722.1" y="592">3.27&#215;</text>
  <text class="fg" x="168" y="620" text-anchor="end">zstd -3</text>
  <rect class="zstd" x="180" y="607" width="523.5" height="19" rx="3"><title>zstd -3: 3.20x, 66.2 MB</title></rect>
  <text class="value fg" x="711.5" y="621">3.20&#215;</text>
  <text class="fg" x="168" y="649" text-anchor="end">zstd -1</text>
  <rect class="zstd" x="180" y="636" width="473.0" height="19" rx="3"><title>zstd -1: 2.89x, 73.3 MB</title></rect>
  <text class="value fg" x="661.0" y="650">2.89&#215;</text>
  <text class="fg" x="168" y="678" text-anchor="end">LZ4 -9 (HC)</text>
  <rect class="lz4" x="180" y="665" width="444.4" height="19" rx="3"><title>LZ4 -9 (HC): 2.72x, 78.0 MB</title></rect>
  <text class="value fg" x="632.4" y="679">2.72&#215;</text>
  <text class="fg" x="168" y="707" text-anchor="end">LZ4 -1</text>
  <rect class="lz4" x="180" y="694" width="343.4" height="19" rx="3"><title>LZ4 -1: 2.10x, 100.9 MB</title></rect>
  <text class="value fg" x="531.4" y="708">2.10&#215;</text>
</svg>
