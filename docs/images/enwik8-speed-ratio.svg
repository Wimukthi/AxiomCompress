<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="610" viewBox="0 0 1000 610" role="img" aria-labelledby="title desc">
  <title id="title">enwik8 compression ratio versus compression throughput</title>
  <desc id="desc">Scatter plot with logarithmic compression throughput horizontally and ratio vertically. Better results move toward the upper right.</desc>
  <style>
    :root{--bg:#fff;--fg:#172033;--muted:#667085;--grid:#d9dee8;--axiom:#e26d2f;--zstd:#238b74;--lz4:#3973c6;--lzma2:#a54d9d;--winrar:#c43b4d;--other:#7b8798}
    @media(prefers-color-scheme:dark){:root{--bg:#0d1117;--fg:#e6edf3;--muted:#9ba7b4;--grid:#30363d;--axiom:#ff934f;--zstd:#4fc3a1;--lz4:#73a7ef;--lzma2:#d88ad0;--winrar:#ff667a;--other:#a6b0bd}}
    .bg{fill:var(--bg)}.fg{fill:var(--fg)}.muted{fill:var(--muted)}.grid{stroke:var(--grid);stroke-width:1}.axis{stroke:var(--muted);stroke-width:1.2}
    text{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:13px}.title{font-size:20px;font-weight:500}.subtitle{font-size:12px}.value{font-weight:500}
    .axiom{fill:var(--axiom)}.zstd{fill:var(--zstd)}.lz4{fill:var(--lz4)}.lzma2{fill:var(--lzma2)}.winrar{fill:var(--winrar)}.other{fill:var(--other)}.best{stroke:var(--fg);stroke-width:2}
  </style>
  <rect class="bg" width="1000" height="610"/>
  <text class="title fg" x="24" y="32">Ratio versus compression throughput</text>
  <text class="subtitle muted" x="24" y="54">100 MB English Wikipedia text &#183; better results move toward the upper right</text>
  <line class="grid" x1="82.0" y1="76" x2="82.0" y2="540"/>
  <text class="muted" x="82.0" y="564" text-anchor="middle">1</text>
  <line class="grid" x1="155.9" y1="76" x2="155.9" y2="540"/>
  <text class="muted" x="155.9" y="564" text-anchor="middle">2</text>
  <line class="grid" x1="253.5" y1="76" x2="253.5" y2="540"/>
  <text class="muted" x="253.5" y="564" text-anchor="middle">5</text>
  <line class="grid" x1="327.4" y1="76" x2="327.4" y2="540"/>
  <text class="muted" x="327.4" y="564" text-anchor="middle">10</text>
  <line class="grid" x1="401.3" y1="76" x2="401.3" y2="540"/>
  <text class="muted" x="401.3" y="564" text-anchor="middle">20</text>
  <line class="grid" x1="499.0" y1="76" x2="499.0" y2="540"/>
  <text class="muted" x="499.0" y="564" text-anchor="middle">50</text>
  <line class="grid" x1="572.8" y1="76" x2="572.8" y2="540"/>
  <text class="muted" x="572.8" y="564" text-anchor="middle">100</text>
  <line class="grid" x1="646.7" y1="76" x2="646.7" y2="540"/>
  <text class="muted" x="646.7" y="564" text-anchor="middle">200</text>
  <line class="grid" x1="744.4" y1="76" x2="744.4" y2="540"/>
  <text class="muted" x="744.4" y="564" text-anchor="middle">500</text>
  <line class="grid" x1="818.2" y1="76" x2="818.2" y2="540"/>
  <text class="muted" x="818.2" y="564" text-anchor="middle">1000</text>
  <line class="grid" x1="892.1" y1="76" x2="892.1" y2="540"/>
  <text class="muted" x="892.1" y="564" text-anchor="middle">2000</text>
  <line class="grid" x1="966.0" y1="76" x2="966.0" y2="540"/>
  <text class="muted" x="966.0" y="564" text-anchor="middle">4000</text>
  <line class="grid" x1="82" y1="540.0" x2="966" y2="540.0"/>
  <text class="muted" x="70" y="544.0" text-anchor="end">1.5&#215;</text>
  <line class="grid" x1="82" y1="462.7" x2="966" y2="462.7"/>
  <text class="muted" x="70" y="466.7" text-anchor="end">2.0&#215;</text>
  <line class="grid" x1="82" y1="385.3" x2="966" y2="385.3"/>
  <text class="muted" x="70" y="389.3" text-anchor="end">2.5&#215;</text>
  <line class="grid" x1="82" y1="308.0" x2="966" y2="308.0"/>
  <text class="muted" x="70" y="312.0" text-anchor="end">3.0&#215;</text>
  <line class="grid" x1="82" y1="230.7" x2="966" y2="230.7"/>
  <text class="muted" x="70" y="234.7" text-anchor="end">3.5&#215;</text>
  <line class="grid" x1="82" y1="153.3" x2="966" y2="153.3"/>
  <text class="muted" x="70" y="157.3" text-anchor="end">4.0&#215;</text>
  <line class="grid" x1="82" y1="76.0" x2="966" y2="76.0"/>
  <text class="muted" x="70" y="80.0" text-anchor="end">4.5&#215;</text>
  <line class="axis" x1="82" y1="540" x2="966" y2="540"/>
  <line class="axis" x1="82" y1="76" x2="82" y2="540"/>
  <text class="fg" x="524.0" y="592" text-anchor="middle">Compression throughput (MB/s, log scale)</text>
  <text class="fg" transform="translate(20 308.0) rotate(-90)" text-anchor="middle">Compression ratio</text>
  <circle class="axiom" cx="683.7" cy="357.4" r="5"><title>Axiom -1: 2.68x, 283.1 MB/s (0.35 s)</title></circle>
  <circle class="axiom" cx="583.0" cy="300.8" r="5"><title>Axiom -2: 3.05x, 110.0 MB/s (0.91 s)</title></circle>
  <circle class="axiom" cx="555.2" cy="294.4" r="5"><title>Axiom -3: 3.09x, 84.8 MB/s (1.18 s)</title></circle>
  <circle class="axiom" cx="497.0" cy="289.6" r="5"><title>Axiom -4: 3.12x, 49.1 MB/s (2.04 s)</title></circle>
  <circle class="axiom" cx="473.3" cy="286.3" r="5"><title>Axiom -5: 3.14x, 39.3 MB/s (2.54 s)</title></circle>
  <circle class="axiom" cx="441.9" cy="284.1" r="5"><title>Axiom -6: 3.15x, 29.3 MB/s (3.42 s)</title></circle>
  <circle class="axiom" cx="457.3" cy="268.9" r="5"><title>Axiom -7: 3.25x, 33.8 MB/s (2.96 s)</title></circle>
  <circle class="axiom" cx="368.2" cy="233.8" r="5"><title>Axiom -8: 3.48x, 14.7 MB/s (6.82 s)</title></circle>
  <circle class="axiom best" cx="364.6" cy="228.9" r="7"><title>Axiom -9: 3.51x, 14.2 MB/s (7.05 s)</title></circle>
  <path class="lz4" d="M860.8,497.0 L865.8,502.0 L860.8,507.0 L855.8,502.0 Z"><title>LZ4 -1: 1.75x, 1491.4 MB/s (0.07 s)</title></path>
  <path class="lz4" d="M750.6,401.2 L755.6,406.2 L750.6,411.2 L745.6,406.2 Z"><title>LZ4 -9 (HC): 2.37x, 530.1 MB/s (0.19 s)</title></path>
  <rect class="zstd" x="897.2" y="386.8" width="10" height="10"><title>zstd -1: 2.46x, 2197.7 MB/s (0.05 s)</title></rect>
  <rect class="zstd" x="840.7" y="330.6" width="10" height="10"><title>zstd -3: 2.82x, 1293.6 MB/s (0.08 s)</title></rect>
  <rect class="zstd" x="643.6" y="270.2" width="10" height="10"><title>zstd -9: 3.21x, 203.6 MB/s (0.49 s)</title></rect>
  <rect class="zstd" x="263.0" y="193.0" width="10" height="10"><title>zstd -19: 3.71x, 5.7 MB/s (17.46 s)</title></rect>
  <rect class="zstd" x="131.9" y="155.0" width="10" height="10"><title>zstd -22 --ultra: 3.96x, 1.7 MB/s (59.77 s)</title></rect>
  <path class="lzma2" d="M191.3,157.1 L197.3,168.1 L185.3,168.1 Z"><title>LZMA2 -mx5: 3.94x, 2.8 MB/s (35.85 s)</title></path>
  <path class="lzma2" d="M176.5,142.3 L182.5,153.3 L170.5,153.3 Z"><title>LZMA2 -mx9: 4.03x, 2.4 MB/s (41.20 s)</title></path>
  <circle class="other" cx="420.0" cy="238.8" r="5"><title>bzip2 -9: 3.45x, 23.8 MB/s (4.19 s)</title></circle>
  <circle class="other" cx="176.6" cy="331.4" r="5"><title>gzip Deflate -9: 2.85x, 2.4 MB/s (41.17 s)</title></circle>
  <rect class="winrar" x="516.4" y="227.1" width="10" height="10"><title>WinRAR -m3: 3.49x, 61.7 MB/s (1.62 s)</title></rect>
  <rect class="winrar" x="476.5" y="192.5" width="10" height="10"><title>WinRAR -m5 128M: 3.71x, 42.5 MB/s (2.35 s)</title></rect>
  <text class="fg" x="374.6" y="216.9" text-anchor="start" font-weight="500">Axiom -9</text>
  <text class="fg" x="278.0" y="216.0" text-anchor="start">zstd -19</text>
  <text class="fg" x="126.9" y="148.0" text-anchor="end">zstd -22 --ultra</text>
  <text class="fg" x="186.5" y="130.3" text-anchor="start">LZMA2 -mx9</text>
  <text class="fg" x="201.3" y="181.1" text-anchor="start">LZMA2 -mx5</text>
  <text class="fg" x="491.5" y="215.5" text-anchor="start">WinRAR -m5 128M</text>
  <text class="fg" x="693.7" y="347.4" text-anchor="start">Axiom -1</text>
  <text class="fg" x="892.2" y="409.8" text-anchor="end">zstd -1</text>
  <circle class="axiom" cx="496.5" cy="49" r="4.5"/>
  <text class="muted" x="506" y="53">Axiom</text>
  <rect class="zstd" x="568" y="45" width="9" height="9"/>
  <text class="muted" x="582" y="53">zstd</text>
  <path class="lz4" d="M648.5,44 L653,49 L648.5,54 L644,49 Z"/>
  <text class="muted" x="658" y="53">LZ4</text>
  <path class="lzma2" d="M724.5,44 L729,54 L720,54 Z"/>
  <text class="muted" x="734" y="53">LZMA2</text>
  <rect class="winrar" x="796" y="45" width="9" height="9"/>
  <text class="muted" x="810" y="53">WinRAR</text>
  <circle class="other" cx="876.5" cy="49" r="4.5"/>
  <text class="muted" x="886" y="53">gzip/bzip2</text>
</svg>
